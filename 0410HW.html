<!DOCTYPE html>
<html>
<head>
<title>A-Frame 3D Basic Example</title>
<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>
<body>
<a-scene>
<!-- 原有物件 
<a-box position="-1 1 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
<a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>

<a-plane position="0 0 -4" rotation="-90 0 0" width="6" height="6" color="#7BC8A4"></a-plane>-->

<a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>

<!-- 圓錐 -->
<a-cone position="-2 1 -5" radius-bottom="0.8" radius-top="0" height="2" color="#FF6B6B"></a-cone>

<!-- 環圈 (使用 torus) -->
<a-torus position="2 1.5 -5" radius="1" radius-tubular="0.2" color="#4ECDC4" rotation="45 45 0"></a-torus>

<!-- 文字標籤 -->
<a-text value="資應3A 1311434035 簡琨諺" position="-2.5 2.5 -3" color="black" scale="2 2 2"></a-text>

<!-- 發光球體 -->
<a-sphere position="-0.5 2 -2" radius="0.5" color="#FFD700" emissive="#FFD700" emissive-intensity="0.5"></a-sphere>

<!-- 立方體網格 -->
<a-box position="2.5 0.5 -2" width="0.6" height="0.6" depth="0.6" color="#9B59B6"></a-box>

<!-- 天空 -->
<a-sky color="#ECECEC"></a-sky>
</a-scene>
</body>
</html>
